<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Suntory KAKUBIN 2026 - 首頁</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#EBB413',
            dark: '#1A1A1A',
            danger: '#D11124'
          },
          fontFamily: {
            serif: ['"Noto Serif TC"', 'serif'],
            sans: ['"Noto Sans TC"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 flex justify-center w-full h-[100dvh] overflow-hidden text-black font-serif transition-opacity duration-500 opacity-0" id="body-main">
  
  <main id="app" class="relative w-full max-w-md h-full bg-brand overflow-hidden shadow-2xl mx-auto flex flex-col">
    
    <!-- Phase 2: Home Page -->
    <section id="phase-2" class="absolute inset-0 z-0">
      <img src="img/home.png" alt="Home Background" class="absolute inset-0 w-full h-full object-cover object-center z-0" />
      <button id="btn-start" class="absolute bottom-16 left-0 right-0 h-48 w-full z-10 opacity-0 cursor-pointer" aria-label="Start"></button>
    </section>

    <!-- Phase 1: Age Gate (Overlay) -->
    <section id="phase-1" class="absolute inset-0 z-50 flex items-center justify-center backdrop-blur-sm bg-black/40 transition-opacity duration-500">
      <div class="relative w-11/12 max-w-sm shadow-2xl overflow-hidden">
        <!-- 採用使用者的 18year.jpg 圖片 -->
        <img src="img/18year.jpg" alt="是否年滿18歲" class="w-full h-auto block" />
        
        <!-- 透明的點擊區塊覆蓋在圖片的下半部：左邊為「是」，右邊為「否」 -->
        <div class="absolute bottom-0 left-0 w-full h-1/3 flex z-10">
          <button id="btn-age-yes" class="flex-1 h-full opacity-0 cursor-pointer" aria-label="是 (Yes)"></button>
          <button id="btn-age-no" class="flex-1 h-full opacity-0 cursor-pointer" aria-label="否 (No)"></button>
        </div>
      </div>
    </section>
    
  </main>

  <script src="script.js"></script>
</body>
</html>
