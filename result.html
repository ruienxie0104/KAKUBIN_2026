<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Suntory KAKUBIN 2026 - 結果</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#EBB413',
            dark: '#1A1A1A',
            danger: '#D11124'
          },
          fontFamily: {
            serif: ['"Noto Serif TC"', 'serif'],
            sans: ['"Noto Sans TC"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 flex justify-center w-full h-[100dvh] overflow-hidden text-black font-serif transition-opacity duration-500 opacity-0" id="body-main">
  
  <main id="app" class="relative w-full max-w-md h-full bg-brand overflow-hidden shadow-2xl mx-auto flex flex-col">
    
    <!-- Phase 5 & 6: Result -->
    <section id="phase-5" class="absolute inset-0 z-10 flex flex-col items-center justify-start bg-brand overflow-y-auto overflow-x-hidden w-full">
      <div class="sunburst absolute inset-0 opacity-20 pointer-events-none min-h-full"></div>
      
      <!-- Top Corner Logos -->
      <div class="absolute top-6 left-6 right-6 flex justify-between items-start z-[60] pointer-events-none">
        <img src="img/icon1.png" alt="Suntory Logo" class="w-16 h-auto object-contain drop-shadow-md" />
        <img src="img/icon2.png" alt="Campaign Logo" class="w-24 h-auto object-contain drop-shadow-md" />
      </div>
      
      <!-- Content Wrapper (Applies padding to content but not the banner) -->
      <!-- Increased pt-24 to pt-36 to push card down further -->
      <div class="relative z-10 w-full flex-grow flex flex-col items-center gap-6 px-6 pt-36 pb-10">
        
        <!-- Hanafuda Card with Stepped Backdrop Layers (Shrunk Size) -->
        <div class="relative flex items-center justify-center w-full my-4 transition-transform transform hover:scale-105 duration-500">
          
          <!-- Back Layer -->
          <div class="absolute w-56 h-44 bg-[#4b4220] rounded-xl z-0 overflow-hidden shadow-lg border-2 border-black/30">
            <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(transparent 8px, #000 8px, #000 9px, transparent 9px); background-size: 20px 20px; background-position: -10px -10px;"></div>
          </div>
          
          <!-- Middle Layer -->
          <div class="absolute w-48 h-56 bg-[#2d2712] rounded-xl z-10 shadow-lg border-2 border-black/50"></div>
          
          <!-- Front Layer -->
          <div class="relative w-44 h-[18rem] z-20 shadow-2xl rounded-2xl overflow-hidden bg-[#EFE3C6] border-[5px] border-black">
            <img id="result-card" src="img/花札牌-01.png" alt="Hanafuda Card" class="absolute inset-0 w-full h-full object-cover" />
          </div>
          
        </div>
        
        <!-- Result Text -->
        <div class="w-full flex items-center justify-center mt-2">
          <div class="w-12 h-[1px] bg-black"></div>
          <h3 id="result-text" class="text-lg font-bold mx-4 whitespace-nowrap">恭喜獲得 <span class="text-danger">經典</span> Highball 一杯</h3>
          <div class="w-12 h-[1px] bg-black"></div>
        </div>
        
        <!-- QR Code Area -->
        <div class="relative mt-2">
          <div class="p-2 bg-white border-2 border-black inline-block">
            <img src="img/qrcode_placeholder.png" alt="Redeem QR Code" class="w-40 h-40 object-contain" />
          </div>
          
          <!-- Phase 6 Stamp -->
          <div id="stamp-redeemed" class="absolute inset-0 flex items-center justify-center opacity-0 scale-150 pointer-events-none transition-all duration-500 ease-out z-20">
            <div class="border-4 border-black bg-black text-white px-4 py-1 -rotate-12 font-bold text-xl tracking-widest shadow-xl">
              已兌換
            </div>
          </div>
        </div>
        
        <!-- Rules List -->
        <ul class="text-xs space-y-2 mt-4 px-4 list-disc text-left w-full max-w-sm">
          <li>請憑QR code於當日角瓶美味祭活動現場兌換，逾時視同放棄</li>
          <li>兌換前請先向工作人員出示已關注官方角瓶IG</li>
          <li>本卡牌僅限兌換一次，一天一人限一杯</li>
          <li>不得轉售、兌換現金或兌換其他贈品</li>
          <li>更多活動詳情請查詢官方角瓶IG</li>
          <li>最終解釋權以台灣三得利(股)公司所有</li>
        </ul>
        
        <button id="btn-simulate" class="mt-2 mb-6 px-4 py-2 border border-black/30 text-xs text-black/50 hover:bg-black/10 rounded">
          Simulate Redemption (Staff)
        </button>
        
      </div>
      
      <!-- In-flow Image Banner (Scrolls with content, full width, flush to bottom) -->
      <div class="relative z-10 w-full mt-auto">
        <img id="global-banner" src="img/banner.png" alt="禁止酒駕" class="w-full h-auto object-contain bg-black block" />
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
